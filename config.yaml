app:
  name: AI Assistant
  version: 1.0.0
backup:
  dir: backups
  interval_days: 7
chromadb:
  path: ./chroma_db
db:
  path: assistant.db
  wal_mode: true
memory:
  ttl:
    calendar: 60
    conversation: 30
    email: 7
    routine: 90
paths:
  bm25_index: bm25_index.pkl
  chroma_db: ./chroma_db
security:
  max_tokens: 28000
  similarity_threshold: 0.9
